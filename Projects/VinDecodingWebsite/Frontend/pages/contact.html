<!DOCTYPE html>
<html lang="en">
<head>
    <base href="/">
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/js/components.js" defer></script>
</head>
<body>

<div data-include="/components/navbar.html"></div>

<section class="centered-content-section">
    <div class="centered-box">
        <h2 class="box-header">Get In Touch</h2>
        <p>Have a question, comment or feedback? We would love to hear from you!<br><br>
        </p>
        <div class="input">
            <label for="nameInput">Your Name</label>
            <input type="text" id="nameInput">
        </div>
        <div class="input">
            <label for="emailInput">Your Email</label>
            <input type="text" id="emailInput">
        </div>
        <div class="textarea">
            <label for="message">Your Message</label>
            <textarea id="message"></textarea>
        </div>
        <div class="vin-actions">
            <button id="Submit">Send</button>
        </div>
    </div>
</section>

<div data-include="/components/footer.html"></div>


<script>
    document.getElementById('Submit').addEventListener('click', async () => {
        const name = document.getElementById('nameInput').value;
        const email = document.getElementById('emailInput').value;
        const message = document.getElementById('message').value;

        // Simple validation
        if (!name || !email || !message) {
            alert("Please fill in all fields.");
            return;
        }

        const data = {name, email, message};

        try {
            const response = await fetch('https://vintrospect-backend-mailer-api.onrender.com/mail-api/send-contact-us', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                alert("Message sent successfully!");
                document.getElementById('nameInput').value = '';
                document.getElementById('emailInput').value = '';
                document.getElementById('message').value = '';
            } else {
                alert("Error sending message: " + (result.error ? JSON.stringify(result.error) : result.result));
            }
        } catch (err) {
            alert("Network error: " + err.message);
        }
    });
</script>

</body>
</html>
